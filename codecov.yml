coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
      color:
        target: 95%
        flags: [color]
      core:
        target: 25%
        flags: [core]
      data:
        target: 95%
        flags: [data]
      dom:
        target: 95%
        flags: [dom]
      export:
        target: 40%
        flags: [export]
      format:
        target: 70%
        flags: [format]
      locales:
        target: 95%
        flags: [locales]
      math:
        target: 80%
        flags: [math]
      react:
        target: 65%
        flags: [react]
      text:
        target: 85%
        flags: [text]
    patch:
      default:
        target: auto

flags:
  color:
    carryforward: true
  core:
    carryforward: true
  data:
    carryforward: true
  dom:
    carryforward: true
  export:
    carryforward: true
  format:
    carryforward: true
  locales:
    carryforward: true
  math:
    carryforward: true
  react:
    carryforward: true
  text:
    carryforward: true
