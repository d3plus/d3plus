<script>

var dataURL = "https://api.datausa.io/tesseract/data.jsonrecords?cube=pums_5&drilldowns=State,Year&measures=Total+Population";

function dataFormat(response) {

  var latestData = response.data
    .filter(function(d) {
      return d.Year === "2018";
    });
  var prevData = response.data
    .filter(function(d) {
      return d.Year === "2017";
    });

  latestData
    .forEach(function(d) {
      var prev = prevData.filter(function(p) {
        return p["ID State"] === d["ID State"];
      })[0];
      d.Previous = prev.Population;
      d.Growth = (d.Population - d.Previous) / d.Previous * 100;
    });

  return latestData;

}
