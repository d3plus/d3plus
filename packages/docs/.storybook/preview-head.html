<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<style>

  pre {
    font-family: ui-monospace, monospace !important;
  }

  .sbdocs-wrapper {
    padding: 2rem !important;
  }

  .sb-anchor > h2 {
    border-bottom: 0 !important;
  }

  h2 {
    margin-top: 3rem !important;
  }

  .docblock-source {
    margin: 0 !important;
  }

  /* kill margins */
  .docblock-argstable, /* control block */
  .sbdocs-preview { /* chart/code block */
    margin: 0 !important;
  }

  .sbdocs-preview-actions {
    margin: auto !important;
  }

  /* hide default type showing in description */
  .docblock-argstable-body tr td:nth-child(2) div:last-child {
    display: none;
  }

  /* decrease paddings */
  .docs-story {
    padding: 20px !important;
  }
  .docs-story > div:first-child { /* viz container */
    padding: 0 !important;
  }

  /* removes inner viz padding */
  .innerZoomElementWrapper > div:first-child {
    border: none !important;
  }
  .viz > svg {
    display: block;
  }

  /* size container div */
  .sb-story {
    align-items: stretch;
    display: flex;
    overflow: hidden !important;
    width: 100%;
  }
  .sb-story > div {
    width: 100%;
  }

  .d3plus-logo .d3plus-plot-x-axis .bar,
  .d3plus-logo .d3plus-plot-y-axis .bar {
    transition: opacity 0.2s;
  }

</style>
