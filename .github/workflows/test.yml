name: Lint Code and Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:

    runs-on: ubuntu-latest
    # Node 26 is still "Current" (LTS begins 2026-10-28), so run it as a
    # forward-compat canary that reports but doesn't block merges when a
    # bleeding-edge dependency lags. The supported LTS lines (22, 24) block.
    continue-on-error: ${{ matrix.node-version == '26.x' }}
    env:
      FORCE_COLOR: "1"

    strategy:
      # Report every version's result instead of cancelling the rest when one
      # leg fails.
      fail-fast: false
      matrix:
        # 22 (Jod) and 24 (Krypton) are Active LTS; 20 (Iron) went EOL
        # 2026-04-30. 26 is the current release (canary, see continue-on-error).
        node-version: [22.x, 24.x, 26.x]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter @d3plus/core exec playwright --version | sed 's/Version //')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      # Both Playwright install steps hit the network / apt and flake
      # intermittently on the runners (install-deps has exited 100 mid-release),
      # so retry each a few times before failing the job.
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until pnpm --filter @d3plus/core exec playwright install chromium; do
            n=$((n + 1))
            if [ "$n" -ge 3 ]; then echo "playwright install chromium failed after $n attempts"; exit 1; fi
            echo "playwright install chromium failed (attempt $n); retrying in 15s..."; sleep 15
          done
      - name: Install Playwright system dependencies
        run: |
          n=0
          until pnpm --filter @d3plus/core exec playwright install-deps chromium; do
            n=$((n + 1))
            if [ "$n" -ge 3 ]; then echo "playwright install-deps chromium failed after $n attempts"; exit 1; fi
            echo "playwright install-deps chromium failed (attempt $n); retrying in 15s..."; sleep 15
          done
      - run: pnpm test
      - name: Typecheck (build types)
        run: pnpm -r --if-present run build:types
      - name: Build docs site (Storybook)
        if: matrix.node-version == '22.x'
        run: pnpm --filter @d3plus/docs build
      - name: Generate coverage reports
        if: matrix.node-version == '22.x'
        run: pnpm -r --if-present run test:coverage
      - name: Fix coverage paths for monorepo
        if: matrix.node-version == '22.x'
        run: |
          for lcov in packages/*/coverage/lcov.info; do
            pkg_dir=$(echo "$lcov" | cut -d/ -f1-2)
            sed -i "s|^SF:|SF:${pkg_dir}/|" "$lcov"
          done
      - name: Upload color coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/color/coverage/lcov.info
          flags: color
          fail_ci_if_error: false
      - name: Upload core coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/core/coverage/lcov.info
          flags: core
          fail_ci_if_error: false
      - name: Upload data coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/data/coverage/lcov.info
          flags: data
          fail_ci_if_error: false
      - name: Upload dom coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/dom/coverage/lcov.info
          flags: dom
          fail_ci_if_error: false
      - name: Upload export coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/export/coverage/lcov.info
          flags: export
          fail_ci_if_error: false
      - name: Upload format coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/format/coverage/lcov.info
          flags: format
          fail_ci_if_error: false
      - name: Upload locales coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/locales/coverage/lcov.info
          flags: locales
          fail_ci_if_error: false
      - name: Upload math coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/math/coverage/lcov.info
          flags: math
          fail_ci_if_error: false
      - name: Upload react coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/react/coverage/lcov.info
          flags: react
          fail_ci_if_error: false
      - name: Upload text coverage
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/text/coverage/lcov.info
          flags: text
          fail_ci_if_error: false
