name: Lint Code and Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:

    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: "1"

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm test
      - name: Generate coverage reports
        if: matrix.node-version == '22.x'
        run: pnpm -r --if-present run test:coverage
      - name: Fix coverage paths for monorepo
        if: matrix.node-version == '22.x'
        run: |
          for lcov in packages/*/coverage/lcov.info; do
            pkg_dir=$(echo "$lcov" | cut -d/ -f1-2)
            sed -i "s|^SF:|SF:${pkg_dir}/|" "$lcov"
          done
      - name: Upload coverage to Codecov
        if: matrix.node-version == '22.x'
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov && chmod +x codecov
          ./codecov create-commit -t ${{ secrets.CODECOV_TOKEN }} --git-service github
          ./codecov create-report -t ${{ secrets.CODECOV_TOKEN }} --git-service github
          for lcov in packages/*/coverage/lcov.info; do
            flag=$(echo "$lcov" | cut -d/ -f2)
            ./codecov do-upload -t ${{ secrets.CODECOV_TOKEN }} -f "$lcov" -F "$flag" --git-service github || true
          done
